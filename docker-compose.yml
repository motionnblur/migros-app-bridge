services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: migros-support-backend
    restart: unless-stopped
    command: ["node", "server.js"]
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---dns-result-order=ipv4first}
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      PGSSLMODE: ${PGSSLMODE:-require}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-false}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      INTERNAL_EVENT_KEY: ${INTERNAL_EVENT_KEY}
      SPRING_SUPPORT_BASE_URL: ${SPRING_SUPPORT_BASE_URL:-http://host.docker.internal:8080}
      SPRING_SUPPORT_INTERNAL_KEY: ${SPRING_SUPPORT_INTERNAL_KEY:-}
      SUPPORT_ALLOWED_ROLES: ${SUPPORT_ALLOWED_ROLES:-support_agent,support_admin,admin}
      SUPPORT_ALLOWED_USERNAMES: ${SUPPORT_ALLOWED_USERNAMES:-}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS:-900000}
      LOGIN_RATE_LIMIT_LOCKOUT_MS: ${LOGIN_RATE_LIMIT_LOCKOUT_MS:-900000}
      LOGIN_RATE_LIMIT_MAX_PER_IP: ${LOGIN_RATE_LIMIT_MAX_PER_IP:-100}
      LOGIN_RATE_LIMIT_MAX_PER_USERNAME_IP: ${LOGIN_RATE_LIMIT_MAX_PER_USERNAME_IP:-10}
      SPRING_REQUEST_TIMEOUT_MS: ${SPRING_REQUEST_TIMEOUT_MS:-5000}
      SUPPORT_STATUS_CONCURRENCY: ${SUPPORT_STATUS_CONCURRENCY:-10}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-100kb}
      ALLOW_INSECURE_INTERNAL_EVENTS: ${ALLOW_INSECURE_INTERNAL_EVENTS:-false}
      ALLOW_INSECURE_SUPPORT_ACCESS: ${ALLOW_INSECURE_SUPPORT_ACCESS:-false}
      ALLOW_INSECURE_DB_DEFAULTS: ${ALLOW_INSECURE_DB_DEFAULTS:-false}
